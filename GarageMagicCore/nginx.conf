server {
    listen 80;
    server_name garage-mtg.fun www.garage-mtg.fun;

    # Redirect HTTP to HTTPS
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name garage-mtg.fun www.garage-mtg.fun;

    ssl_certificate     /etc/letsencrypt/live/garage-mtg.fun/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/garage-mtg.fun/privkey.pem;

    # Proxy all /api/ requests to the ASP.NET Core backend
    location /api/ {
        proxy_pass         http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
    }

    # Serve the frontend (React / Vite build output)
    location / {
        root   /var/www/garage-mtg;
        index  index.html;
        try_files $uri $uri/ /index.html;
    }
}

